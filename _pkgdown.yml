template:
  bootstrap: 5
  light-switch: true
  
home:
  title: anovapowersim — Simple power simulations for ANOVAs
  description: 

navbar:
  structure:
    left:  [intro, guides, calculated, reference, news]
    right: [github, lightwitch]
  components:
    intro:
      text: Get started
      href: articles/anovapowersim.html
    guides:
      text: Guides
      menu:
      - text: Fixed-sample power
        href: articles/fixed-sample-power.html
      - text: Power for unbalanced designs
        href: articles/unbalanced-designs.html
      - text: Covariance and nonsphericity
        href: articles/covariance.html
      - text: Calculated power
        href: articles/calculated-power.html
      - text: Comparison with G\*Power
        href: articles/comparison-with-gpower.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html

reference:
  - title: Core simulation
    desc: >
      Required-sample-size searches and power curves for balanced designs.
    contents:
      - power_n
      - power_curve
      - plot_power_curve

  - title: Fixed-sample simulation
    desc: >
      Achieved power and effect-size sensitivity at a fixed sample size.
    contents:
      - power_achieved
      - power_sensitivity

  - title: Calculated power
    desc: >
      Calculation-only analyses that skip simulations.
    contents:
      - power_n_calc
      - power_achieved_calc
      - power_sensitivity_calc

  - title: Unbalanced designs
    desc: >
      Fixed-design simulation with explicit sample sizes, means, and SDs.
    contents:
      - power_unbalanced
      - cell_design
      - unbalanced_covariance

  - title: Design components
    desc: >
      Component functions for power analyses.
    contents:
      - balanced_anova_design
      - within_covariance
      - design_term_means
      - simulate_design_dataset
      - compute_scale_factor

  - title: Output methods
    desc: >
      Printing and summarising power-analysis results.
    contents:
      - print.anovapowersim_curve
      - summary.anovapowersim_curve
      - print.anovapowersim_achieved_power
      - summary.anovapowersim_achieved_power
      - print.anovapowersim_sensitivity
      - summary.anovapowersim_sensitivity
      - print.anovapowersim_unbalanced_power
      - summary.anovapowersim_unbalanced_power

articles:
